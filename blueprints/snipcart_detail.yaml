title: Snipcart Detail
extends@:
  type: default
  context: blueprints://pages

form:
  fields:
    tabs:
      type: tabs
      active: 1
      fields:
        content:
          fields:
            header.snipcart.description:
              ordering@: 2
              type: text
              label: Description
              style: vertical
              size: long

        snipcart:
          type: tab
          title: Snipcart Item
          fields:

            snipcart_title:
              type: spacer
              title: Snipcart

            header.snipcart.product_id:
              type: text
              label: Product ID
              size: small
              validate:
                required: true

            header.snipcart.price:
              type: number
              label: Price
              size: small
              validate:
                required: true

            header.snipcart.categories:
              type: selectize
              label: Categories
              toggleable: true
              size: medium
              validate:
                type: commalist

            header.snipcart.file_guid:
              type: text
              label: File GUID
              toggleable: true
              size: medium

            header.snipcart.stackable:
              type: toggle
              label: Stackable
              size: small
              toggleable: true
              highlight: 1
              default: 1
              options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
              validate:
                type: bool

            header.snipcart.shipable:
              type: toggle
              label: Shipable
              size: small
              toggleable: true
              highlight: 1
              default: 1
              options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
              validate:
                type: bool

            header.snipcart.taxable:
              type: toggle
              label: Taxable
              size: small
              toggleable: true
              highlight: 1
              default: 1
              options:
                1: PLUGIN_ADMIN.ENABLED
                0: PLUGIN_ADMIN.DISABLED
              validate:
                type: bool

            header.snipcart.metadata:
              type: textarea
              label: JSON Metadata
              toggleable: true

            dimensions:
              type: section
              title: Shipping Dimensions
              fields:

                header.snipcart.dimensions.weight:
                  type: number
                  label: Weight (g)
                  toggleable: true
                  size: small

                header.snipcart.dimensions.width:
                  type: number
                  label: Width (cm)
                  toggleable: true
                  size: small

                header.snipcart.dimensions.length:
                  type: number
                  label: Length (cm)
                  toggleable: true
                  size: small

                header.snipcart.dimensions.height:
                  type: number
                  label: Height (cm)
                  toggleable: true
                  size: small

            quantity:
              type: section
              title: Quantity
              fields:

                header.snipcart.quantity.quantity:
                  type: number
                  label: Default Quantity
                  toggleable: true
                  size: small

                header.snipcart.quantity.min_quantity:
                  type: number
                  label: Min Quantity
                  toggleable: true
                  size: small

                header.snipcart.quantity.max_quantity:
                  type: number
                  label: Max Quantity
                  toggleable: true
                  size: small

                header.snipcart.quantity.quantity_step:
                  type: number
                  label: Quantity Step
                  toggleable: true
                  size: small

            taxes:
              type: section
              title: Taxes
              fields:

                header.snipcart.taxes.taxes:
                  type: selectize
                  label: Taxes to apply
                  toggleable: true
                  size: medium
                  validate:
                    type: commalist

                header.snipcart.taxes.has_included:
                  type: toggle
                  label: Taxes included
                  size: small
                  toggleable: true
                  highlight: 0
                  default: 0
                  options:
                    1: PLUGIN_ADMIN.YES
                    0: PLUGIN_ADMIN.NO
                  validate:
                    type: bool

            payment:
              type: section
              title: Payment
              fields:

                header.snipcart.payment.interval:
                  type: select
                  label: Interval
                  toggleable: true
                  size: medium
                  options:
                    Day: Day
                    Week: Week
                    Month: Month
                    Year: Year

                header.snipcart.payment.interval_count:
                  type: number
                  label: Interval Count
                  toggleable: true
                  size: small

                header.snipcart.payment.trial:
                  type: number
                  label: Trial Days
                  toggleable: true
                  size: small

            subscription:
              type: section
              title: Subscription
              fields:

                header.snipcart.subscription.recurring_shipping:
                  type: toggle
                  label: Recurring Shipping
                  size: small
                  toggleable: true
                  highlight: 1
                  default: 1
                  options:
                    1: PLUGIN_ADMIN.ENABLED
                    0: PLUGIN_ADMIN.DISABLED
                  validate:
                    type: bool

                header.snipcart.subscription.cancellation_action:
                  type: select
                  label: Cancellation Action
                  toggleable: true
                  size: medium
                  options:
                    PartialRefundLastPayment: Partial Refund Last Payment
                    CancelAtCurrentCycleEnd: Cancel At Current Cycle End

                header.snipcart.subscription.pausing_action:
                  type: select
                  label: Pausing Action
                  toggleable: true
                  size: medium
                  options:
                    KeepActiveUntilEndOfBillingCycle: Keep Active Until End Of Billing Cycle
                    PauseAndRealignBillingCycleOnResume: Pause And Realign Billing Cycle On Resume
