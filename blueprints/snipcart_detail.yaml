title: Snipcart Detail
extends@:
  type: default
  context: blueprints://pages

form:
  fields:
    tabs:
      type: tabs
      active: 1
      fields:

        snipcart:
          type: tab
          title: Snipcart Item
          fields:

            snipcart_title:
              type: spacer
              title: Snipcart

            header.snipcart.product_id:
              type: text
              label: Product ID
              size: small
              validate:
                required: true

            header.snipcart.price:
              type: number
              label: Price
              size: small
              validate:
                required: true

            header.snipcart.weight:
              type: number
              label: Weight
              size: small

            header.snipcart.description:
              type: text
              label: Description
              size: long

